# Musicload Cron Configuration Example
#
# This file defines playlists to be monitored and synchronized automatically
# according to cron schedules.

playlists:
  workout:
    url: https://music.youtube.com/playlist?list=PLrAXtmErZgOeiKm4sgNOknGvNjby9efdf
    sync: false
    schedule: "0 6 * * *"  # Daily at 06:00

  # Another Deezer playlist example
  # deezer-favs-2:
  #   url: https://www.deezer.com/playlist/908622995
  #   sync: true  # Sync mode: delete local files when tracks are removed
  #   schedule: "0 7 * * *"  # Daily at 07:00

# Plugin-based syncs (NEW!)
# Plugins allow fetching music from sources other than playlists
plugins:
  # Listenbrainz weekly recommendations
  listenbrainz-discoveries:
    type: listenbrainz
    sync: false
    schedule: "0 8 * * 1" # Every Monday at 8am
    config:
      user: your_listenbrainz_username
      recommendation_type: weekly-exploration # or 'weekly-jams'

  # RSS feed example (music podcast, blog, etc.)
  # music-podcast:
  #   type: rss
  #   sync: true  # Remove tracks that are no longer in the feed
  #   schedule: "0 */6 * * *"  # Every 6 hours
  #   config:
  #     url: https://example.com/music-feed.rss
  #     artist_field: creator  # Optional: customize field mappings
  #     title_field: title

  # Reddit r/listentothis - discover new music daily
  reddit-listentothis:
    type: reddit
    sync: false
    schedule: "0 9 * * *" # Daily at 9am
    config:
      subreddit: listentothis
      sort: top
      time_filter: day
      limit: 25
      min_score: 100 # Only highly upvoted tracks

  # Reddit r/Music - weekly top posts
  # reddit-music-weekly:
  #   type: reddit
  #   sync: true  # Remove tracks that fall off the list
  #   schedule: "0 10 * * 1"  # Monday at 10am
  #   config:
  #     subreddit: Music
  #     sort: top
  #     time_filter: week
  #     limit: 50
  #     min_score: 500

  # Reddit r/IndieHeads - hot tracks every 6 hours
  # reddit-indieheads:
  #   type: reddit
  #   sync: false
  #   schedule: "0 */6 * * *"
  #   config:
  #     subreddit: indieheads
  #     sort: hot
  #     limit: 20
  #     min_score: 50

# Explore sources - sync charts and mood/genre categories from YouTube Music
explore:
  # Sync global music charts daily
  global-charts:
    type: charts
    country: ZZ # ISO 3166-1 Alpha-2 code (ZZ = global)
    sync: true # Remove tracks that fall off the charts
    schedule: "0 6 * * *" # Daily at 06:00
    limit: 10 # Fetch top 10 songs

  # Sync US charts weekly
  # us-charts:
  #   type: charts
  #   country: US
  #   sync: true
  #   schedule: "0 6 * * 1"  # Every Monday at 06:00

  # Sync a specific playlist from a mood/genre category
  # Use 'musicload explore moods' to discover available categories and their params
  # Use 'musicload explore mood-playlists <PARAMS>' to see available playlists
  # chill-vibes:
  #   type: mood
  #   params: "ggMPOg1uX1J"           # Params string from 'musicload explore moods'
  #   playlist_id: "RDCLAK5uy_..."   # Optional: target specific playlist (get from explore mood-playlists)
  #   sync: false                     # Keep tracks even if removed from the playlist
  #   schedule: "0 12 * * 0"          # Weekly on Sunday at noon
  #
  # Note: If playlist_id is not specified, all playlists in the category will be fetched (legacy behavior)

# Hooks - run commands when events occur
# Useful for integrating with external systems like Navidrome
hooks:
  # Import playlist to Navidrome when updated
  # Uses Navidrome's playlist import API (see https://github.com/navidrome/navidrome/pull/2273)
  - event: playlist_updated
    command: |
      curl -X POST \
        -H "Content-Type: audio/x-mpegurl" \
        -H "X-ND-Authorization: Bearer ${NAVIDROME_TOKEN}" \
        --data-binary @"${MUSICLOAD_PLAYLIST_PATH}" \
        "${NAVIDROME_URL}/api/playlist"
    timeout: 30 # seconds (default: 60)

  # Log sync results
  - event: sync_completed
    command: |
      echo "[$(date)] Sync completed: ${MUSICLOAD_PLAYLIST_NAME} - Downloaded: ${MUSICLOAD_DOWNLOADED}, Skipped: ${MUSICLOAD_SKIPPED}, Failed: ${MUSICLOAD_FAILED}" >> /var/log/musicload-sync.log
    run_on_error: true # Run even if sync failed (default: false)

  # Custom script example - backup playlist on update
  # - event: playlist_updated
  #   command: cp "${MUSICLOAD_PLAYLIST_PATH}" "/backup/playlists/${MUSICLOAD_PLAYLIST_NAME}_$(date +%Y%m%d).m3u"
# Hook events:
#   - playlist_updated: Triggered when an M3U playlist is created/updated
#   - sync_completed: Triggered after every sync operation (success or failure)
#
# Environment variables available to hooks:
#   MUSICLOAD_EVENT          - Event type (playlist_updated, sync_completed)
#   MUSICLOAD_PLAYLIST_NAME  - Name of the playlist/plugin
#   MUSICLOAD_PLAYLIST_PATH  - Absolute path to the M3U file (if exists)
#   MUSICLOAD_SYNC_TYPE      - Type: "playlist" or "plugin"
#   MUSICLOAD_DOWNLOADED     - Number of tracks downloaded
#   MUSICLOAD_SKIPPED        - Number of tracks skipped
#   MUSICLOAD_DELETED        - Number of tracks deleted
#   MUSICLOAD_FAILED         - Number of tracks that failed
#   MUSICLOAD_SUCCESS        - "true" or "false"

# Usage:
#   musicload cron                          # Run continuously
#   musicload cron --config cron.yaml       # Specify config file
#   musicload cron --once                   # Sync all playlists and plugins once and exit
#   musicload cron --output /custom/path    # Override download directory
#
#   musicload plugins list                  # List available plugins
#   musicload plugins run listenbrainz --config '{"user": "myuser"}'
#
# State files are stored in:
#   - Playlists: {download_dir}/.musicload/state/
#   - Plugins: {download_dir}/.musicload/plugin_state/
# M3U playlists are stored in: {download_dir}/{name}.m3u
